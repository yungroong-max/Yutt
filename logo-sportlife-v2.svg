<svg width="600" height="220" viewBox="0 0 600 220" xmlns="http://www.w3.org/2000/svg" font-family="'Poppins','Segoe UI',sans-serif">
  <defs>
    <radialGradient id="gFoot" cx="38%" cy="32%" r="75%">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#cfd6e0"/>
    </radialGradient>
    <radialGradient id="gBask" cx="36%" cy="30%" r="80%">
      <stop offset="0" stop-color="#F7A24B"/><stop offset="1" stop-color="#C2540F"/>
    </radialGradient>
    <radialGradient id="gTen" cx="36%" cy="30%" r="80%">
      <stop offset="0" stop-color="#E4F75A"/><stop offset="1" stop-color="#9FC014"/>
    </radialGradient>
    <radialGradient id="gVol" cx="38%" cy="30%" r="80%">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#d7e2f3"/>
    </radialGradient>
    <radialGradient id="gCork" cx="40%" cy="30%" r="80%">
      <stop offset="0" stop-color="#FCEBC4"/><stop offset="1" stop-color="#E0B775"/>
    </radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E6FF2"/><stop offset="0.5" stop-color="#16B488"/><stop offset="1" stop-color="#FF5C8A"/>
    </linearGradient>
  </defs>

  <g transform="translate(24,18)">
    <!-- ===== arc of 5 realistic balls ===== -->
    <!-- 1 BADMINTON shuttlecock -->
    <g transform="translate(18,60) rotate(-30)">
      <path d="M0 6 L-16 -34 Q0 -42 16 -34 Z" fill="#ffffff" stroke="#c4ccd8" stroke-width="1.2"/>
      <path d="M-9 -10 L-12 -32 M0 -13 L0 -36 M9 -10 L12 -32" stroke="#c4ccd8" stroke-width="1.2"/>
      <circle cx="0" cy="8" r="9" fill="url(#gCork)" stroke="#c89b54" stroke-width="1"/>
    </g>
    <!-- 2 TENNIS -->
    <g transform="translate(60,30)">
      <circle r="24" fill="url(#gTen)"/>
      <path d="M-24 -6 Q-6 -18 -2 24 M24 6 Q6 18 2 -24" fill="none" stroke="#ffffff" stroke-width="2.6"/>
      <ellipse cx="-8" cy="-9" rx="8" ry="5" fill="#ffffff" opacity="0.35"/>
    </g>
    <!-- 3 FOOTBALL (soccer) -->
    <g transform="translate(102,22)">
      <circle r="26" fill="url(#gFoot)"/>
      <g fill="#1a2230">
        <polygon points="0,-9 9,-2 6,9 -6,9 -9,-2"/>
        <polygon points="0,-26 7,-20 0,-12 -7,-20"/>
        <polygon points="24,-9 19,1 10,-3 13,-14"/>
        <polygon points="-24,-9 -13,-14 -10,-3 -19,1"/>
        <polygon points="-15,24 -6,12 6,12 15,24"/>
      </g>
      <ellipse cx="-9" cy="-11" rx="8" ry="5" fill="#ffffff" opacity="0.5"/>
    </g>
    <!-- 4 VOLLEYBALL -->
    <g transform="translate(144,30)">
      <circle r="24" fill="url(#gVol)"/>
      <g fill="none" stroke="#2E6FF2" stroke-width="2.4">
        <path d="M-24 -4 Q-2 -8 6 -24"/>
        <path d="M-20 14 Q-4 2 24 6"/>
        <path d="M2 24 Q8 4 -8 -22"/>
      </g>
      <ellipse cx="-8" cy="-9" rx="7" ry="4.5" fill="#ffffff" opacity="0.45"/>
    </g>
    <!-- 5 BASKETBALL -->
    <g transform="translate(186,60)">
      <circle r="24" fill="url(#gBask)"/>
      <g fill="none" stroke="#5a2606" stroke-width="2.2">
        <path d="M0 -24 V24"/><path d="M-24 0 H24"/>
        <path d="M-17 -17 Q0 0 -17 17"/><path d="M17 -17 Q0 0 17 17"/>
      </g>
      <ellipse cx="-8" cy="-9" rx="7" ry="4.5" fill="#ffffff" opacity="0.25"/>
    </g>

    <!-- ===== friendly glasses ===== -->
    <g transform="translate(0,92)">
      <path d="M30 18 Q16 12 6 22" fill="none" stroke="#1F3A5F" stroke-width="9" stroke-linecap="round"/>
      <path d="M174 18 Q188 12 198 22" fill="none" stroke="#1F3A5F" stroke-width="9" stroke-linecap="round"/>
      <path d="M76 14 Q102 0 128 14" fill="none" stroke="#1F3A5F" stroke-width="9" stroke-linecap="round"/>
      <circle cx="62" cy="30" r="34" fill="#eaf1ff" fill-opacity="0.65" stroke="#1F3A5F" stroke-width="9"/>
      <circle cx="142" cy="30" r="34" fill="#eaf1ff" fill-opacity="0.65" stroke="#1F3A5F" stroke-width="9"/>
      <path d="M44 16 Q40 30 50 44" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
      <path d="M124 16 Q120 30 130 44" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    </g>
  </g>

  <!-- ===== wordmark ===== -->
  <text x="270" y="112" font-size="60" font-weight="800" letter-spacing="-1">
    <tspan fill="#1F3A5F">Sport</tspan><tspan fill="url(#ink)">life</tspan>
  </text>
  <text x="273" y="146" font-size="22" font-weight="700" letter-spacing="2" fill="#16B488">อัพเดตข่าวกีฬา</text>
</svg>
